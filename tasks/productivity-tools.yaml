- name: Generic productivity
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  with_items:
    - wget
    - fzf
    - lazygit
    - nvim
    - xclip
    - ripgrep
    - go
    - node
    - git
  ignore_errors: yes
  tags:
    - install
    - productivity

- name: Install work related tools
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  with_items:
    - kubernetes-cli
    - awscli
    - terraform
  ignore_errors: yes
  tags:
    - install
    - productivity

- name: Install bun 
  shell: curl -fsSL https://bun.sh/install | bash
  tags: 
  - install
  - productivity
-
